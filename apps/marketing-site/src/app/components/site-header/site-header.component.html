<header class="site-header">
  <div class="shell">
    <a class="logo" routerLink="/" (click)="closeMenu()" aria-label="A11y Assistant home">
      <span class="logo-mark" aria-hidden="true">
        <span class="beam"></span>
        <span class="dot"></span>
      </span>
      <span class="logo-text">
        <span class="word">A11y Assistant</span>
        <span class="sub">ADA-grade compliance</span>
      </span>
    </a>

    <button
      type="button"
      class="menu-toggle"
      aria-label="Toggle navigation menu"
      [attr.aria-expanded]="isMenuOpen"
      (click)="toggleMenu()"
    >
      <span class="menu-icon" aria-hidden="true"></span>
    </button>

    <nav class="nav" [class.nav-open]="isMenuOpen" aria-label="Primary">
      <ul>
        <li *ngFor="let link of navLinks">
          <a routerLinkActive="active" [routerLink]="link.path" (click)="closeMenu()">{{ link.label }}</a>
        </li>
      </ul>
      <div class="cta">
        <span class="badge" aria-hidden="true">Free forever</span>
        <ui-cta-button routerLink="/scan" label="Run a free scan" variant="primary"></ui-cta-button>
        <a class="ghost-link" routerLink="/signup" (click)="closeMenu()">Sign up</a>
      </div>
    </nav>
  </div>
</header>
