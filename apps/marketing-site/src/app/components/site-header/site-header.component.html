<header class="site-header" aria-label="Primary">
  <div class="shell header-shell">
    <a class="logo" routerLink="/" (click)="closeMenu()">
      <span class="logo-mark" aria-hidden="true">A11y</span>
      <span class="logo-text">
        <span class="logo-name">A11y Assistant</span>
        <span class="logo-sub">Compliance clarity</span>
      </span>
    </a>

    <button
      type="button"
      class="menu-toggle"
      aria-label="Toggle navigation menu"
      [attr.aria-expanded]="isMenuOpen"
      (click)="toggleMenu()"
    >
      <span class="menu-icon" aria-hidden="true"></span>
    </button>

    <nav class="nav" [class.nav-open]="isMenuOpen">
      <ul>
        <li *ngFor="let link of navLinks">
          <a routerLinkActive="active" [routerLink]="link.path" (click)="closeMenu()">{{ link.label }}</a>
        </li>
      </ul>
      <div class="cta">
        <span class="nav-note">Accessibility-first • WCAG 2.2</span>
        <ui-cta-button routerLink="/scan" label="Run a free scan" variant="primary"></ui-cta-button>
      </div>
    </nav>
  </div>
</header>
