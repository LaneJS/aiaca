<header class="site-header" role="banner">
  <div class="header-container">
    <!-- Logo -->
    <a class="logo" routerLink="/" (click)="closeMenu()" aria-label="A11y Assistant - Go to homepage">
      <span class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </span>
      <span class="logo-text">
        <span class="logo-name">AACA</span>
        <span class="logo-tagline">A11y Assistant</span>
      </span>
    </a>

    <!-- Mobile Menu Toggle -->
    <button
      type="button"
      class="menu-toggle"
      aria-label="Toggle navigation menu"
      [attr.aria-expanded]="isMenuOpen"
      aria-controls="main-nav"
      (click)="toggleMenu()"
    >
      <span class="menu-icon" [class.menu-icon--open]="isMenuOpen" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>

    <!-- Navigation -->
    <nav
      id="main-nav"
      class="nav"
      [class.nav--open]="isMenuOpen"
      aria-label="Primary navigation"
    >
      <ul class="nav-list" role="list">
        <li *ngFor="let link of navLinks" class="nav-item">
          <a
            class="nav-link"
            routerLinkActive="nav-link--active"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            [routerLink]="link.path"
            (click)="closeMenu()"
          >
            {{ link.label }}
          </a>
        </li>
      </ul>

      <!-- CTA Buttons -->
      <div class="nav-cta">
        <a routerLink="/login" class="login-link" (click)="closeMenu()">Log in</a>
        <ui-cta-button
          routerLink="/scan"
          label="Free scan"
          variant="primary"
          size="small"
          (click)="closeMenu()"
        ></ui-cta-button>
      </div>
    </nav>
  </div>
</header>
